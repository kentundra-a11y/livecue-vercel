<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LiveCue Phase 5 Auto Alerts</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--ink:#111827;--muted:#667085;--line:#e4e7ec;--purple:#6d28d9;--green:#166534;--blue:#1d4ed8;--red:#b42318}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink)}button,input,select{font:inherit}.wrap{max-width:980px;margin:auto;padding:18px}.hero{background:linear-gradient(135deg,#111827,#5b21b6);color:white;border-radius:24px;padding:23px;box-shadow:0 16px 40px #11182720}.hero h1{margin:0 0 7px;font-size:31px}.hero p{margin:0;color:#ddd6fe}.heroRow{display:flex;justify-content:space-between;align-items:center;gap:16px}.update{border:0;background:white;color:#4c1d95;border-radius:15px;padding:14px 19px;font-weight:900;min-width:180px}.update:disabled{opacity:.65}.last{margin-top:12px;font-size:12px;color:#ddd6fe}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:24px 0 12px}.toolbar h2{margin:0}.btn{border:0;border-radius:11px;padding:10px 13px;font-weight:800;cursor:pointer}.dark{background:#111827;color:white}.ghost{background:white;border:1px solid var(--line)}.form{display:grid;grid-template-columns:1fr 160px;gap:9px;background:white;border:1px solid var(--line);border-radius:16px;padding:13px;margin-bottom:13px}.form input{border:1px solid var(--line);border-radius:10px;padding:11px}.artists{display:flex;gap:8px;flex-wrap:wrap}.chip{border:1px solid var(--line);background:white;border-radius:99px;padding:8px 11px;font-weight:800}.chip.off{opacity:.4}.manual{margin:18px 0;background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px}.manual h2{font-size:17px;margin:0 0 10px}.manual p{font-size:12px;color:var(--muted);margin:0 0 10px}.manualForm{display:grid;grid-template-columns:140px 1fr 210px 1fr auto;gap:8px}.manualForm input{min-width:0;border:1px solid var(--line);border-radius:10px;padding:10px}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:15px 0}.stat{background:white;border:1px solid var(--line);border-radius:14px;padding:12px}.stat strong{display:block;font-size:23px}.stat span{font-size:11px;color:var(--muted)}.events{display:grid;gap:11px}.card{background:white;border:1px solid var(--line);border-radius:18px;padding:16px}.card.new{border:2px solid #8b5cf6}.card.urgent{box-shadow:0 0 0 3px #fda29b}.top{display:flex;justify-content:space-between;gap:12px}.artist{font-size:12px;font-weight:800;color:var(--muted)}h3{margin:3px 0 0;font-size:18px}.badges{display:flex;gap:5px;flex-wrap:wrap}.badge{border-radius:99px;padding:5px 8px;font-size:11px;font-weight:900;height:max-content}.open{background:#dcfce7;color:var(--green)}.soon{background:#dbeafe;color:var(--blue)}.waiting{background:#f2f4f7;color:#475467}.ended{background:#fee4e2;color:var(--red)}.newb{background:#ede9fe;color:#5b21b6}.alertb{background:#fee4e2;color:var(--red)}.meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:13px 0}.box{background:#f9fafb;border-radius:11px;padding:10px}.box small{display:block;color:var(--muted)}.actions{display:flex;gap:8px}.actions a,.actions button{flex:1;text-align:center;text-decoration:none;border-radius:10px;padding:10px;font-weight:800}.note,.empty{background:white;border:1px dashed #cbd5e1;border-radius:16px;padding:24px;color:var(--muted);line-height:1.6}.log{margin-top:13px;background:white;border:1px solid var(--line);border-radius:16px;padding:13px}.log div{padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}.log div:last-child{border-bottom:0}.error{color:var(--red)}#toast{position:fixed;bottom:22px;left:50%;transform:translate(-50%,20px);background:#111827;color:#fff;border-radius:99px;padding:10px 15px;opacity:0;transition:.2s}#toast.show{opacity:1;transform:translate(-50%,0)}@media(max-width:760px){.heroRow{display:block}.update{width:100%;margin-top:14px}.form,.manualForm{grid-template-columns:1fr}.summary{grid-template-columns:1fr 1fr}.meta{grid-template-columns:1fr}.actions{display:grid}.top{display:block}.badges{margin-top:8px}}
</style></head><body><main class="wrap">
<section class="hero"><div class="heroRow"><div><h1>LiveCue</h1><p>日本の公式サイトから先行・一般販売を確認</p><div id="last" class="last">まだ更新していません</div></div><button id="update" class="update">↻ 公式情報を更新</button></div></section>
<div class="toolbar"><h2>お気に入り</h2><button id="reset" class="btn ghost">初期化</button></div>
<div class="form"><input id="artistInput" placeholder="アーティスト名を入力"><button id="add" class="btn dark">＋ 登録</button></div><div id="artists" class="artists"></div>
<div class="summary"><div class="stat"><strong id="newCount">0</strong><span>新着</span></div><div class="stat"><strong id="openCount">0</strong><span>受付中</span></div><div class="stat"><strong id="soonCount">0</strong><span>販売予定</span></div><div class="stat"><strong id="allCount">0</strong><span>公演情報</span></div></div>
<div class="toolbar"><h2>販売・公演情報</h2></div><div id="events" class="events"></div><div id="log" class="log"></div>
</main><div id="toast"></div>
<script>
(()=>{'use strict';const STORE='livecue-phase5-auto-v1';const defaults={artists:[{id:'a1',name:'くるり',active:true},{id:'a2',name:'Bialystocks',active:true}],events:[],seen:{},lastChecked:null,logs:[]};let state;try{state=JSON.parse(localStorage.getItem(STORE))||structuredClone(defaults)}catch(e){state=structuredClone(defaults)}
const $=id=>document.getElementById(id),save=()=>localStorage.setItem(STORE,JSON.stringify(state)),esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));function toast(t){$('toast').textContent=t;$('toast').className='show';setTimeout(()=>$('toast').className='',1800)}function fmt(d){if(!d)return '未発表';try{return new Date(d).toLocaleString('ja-JP')}catch(e){return d}}function activeArtists(){return state.artists.filter(a=>a.active)}
function renderArtists(){$('artists').innerHTML=state.artists.map(a=>`<button class="chip ${a.active?'':'off'}" data-id="${esc(a.id)}">★ ${esc(a.name)}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{const a=state.artists.find(x=>x.id===b.dataset.id);a.active=!a.active;save();render()})}
function downloadICS(ics,name){const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}function icsText(s){return String(s||'').replace(/[\\,;]/g,' ').replace(/\r?\n/g,' ')}function icsLocal(value,fallbackTime='10:00'){if(!value)return '';const normalized=value.length===10?value+'T'+fallbackTime:value;const d=new Date(normalized);if(Number.isNaN(d.getTime()))return '';const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}T${p(d.getHours())}${p(d.getMinutes())}00`}function allEvents(){return state.events}
function createICS(e){const start=icsLocal(e.liveDate+(e.liveTime?'T'+e.liveTime:''),'19:00');if(!start)return toast('公演日時が未発表です');const ics=`BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//LiveCue//JP\r\nBEGIN:VEVENT\r\nUID:event-${icsText(e.id)}@livecue\r\nDTSTART:${start}\r\nSUMMARY:${icsText(e.artist+' '+e.title)}\r\nLOCATION:${icsText(e.venue+' '+e.city)}\r\nDESCRIPTION:${icsText(e.url)}\r\nEND:VEVENT\r\nEND:VCALENDAR`;downloadICS(ics,'livecue-event.ics')}
function createSaleAlert(e){const start=icsLocal(e.saleDate);if(!start)return toast('販売開始日時を手動登録してください');const summary='販売開始：'+e.artist+' '+e.title;const ics=`BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//LiveCue//JP\r\nBEGIN:VEVENT\r\nUID:sale-${icsText(e.id)}@livecue\r\nDTSTART:${start}\r\nDURATION:PT30M\r\nSUMMARY:${icsText(summary)}\r\nDESCRIPTION:${icsText(e.url)}\r\nBEGIN:VALARM\r\nTRIGGER:-P1D\r\nACTION:DISPLAY\r\nDESCRIPTION:${icsText('明日 '+summary)}\r\nEND:VALARM\r\nBEGIN:VALARM\r\nTRIGGER:-PT1H\r\nACTION:DISPLAY\r\nDESCRIPTION:${icsText('1時間後 '+summary)}\r\nEND:VALARM\r\nEND:VEVENT\r\nEND:VCALENDAR`;downloadICS(ics,'livecue-sale-alert.ics')}
function urgency(e){if(!e.saleDate)return '';const ms=Date.parse(e.saleDate)-Date.now();if(ms<0)return '';const days=Math.ceil(ms/86400000);return days<=1?'本日〜明日開始':days<=7?`あと${days}日`:''}
function render(){renderArtists();$('last').textContent=state.lastChecked?'最終確認：'+fmt(state.lastChecked):'まだ更新していません';const active=new Set(activeArtists().map(a=>a.name));const list=allEvents().filter(e=>active.has(e.artist));$('newCount').textContent=list.filter(e=>e.isNew).length;$('openCount').textContent=list.filter(e=>e.status==='open').length;$('soonCount').textContent=list.filter(e=>e.status==='soon').length;$('allCount').textContent=list.length;if(!list.length){$('events').innerHTML='<div class="empty">「公式情報を更新」を押すと、今日以降に開催される公演だけを表示します。販売開始24時間前には自動メール通知できます。</div>'}else{$('events').innerHTML=list.map(e=>{const alert=urgency(e);return `<article class="card ${e.isNew?'new':''} ${alert?'urgent':''}"><div class="top"><div><div class="artist">${esc(e.artist)} ｜ ${esc(e.source||'情報源未設定')}</div><h3>${esc(e.title)}</h3></div><div class="badges">${e.isNew?'<span class="badge newb">新着</span>':''}${alert?`<span class="badge alertb">${esc(alert)}</span>`:''}<span class="badge ${esc(e.status)}">${e.status==='open'?'受付中':e.status==='soon'?'販売予定':e.status==='ended'?'終了':'要確認'}</span></div></div><div class="meta"><div class="box"><small>公演</small><strong>${esc(e.liveDate||'日程は公式サイトで確認')} ${esc(e.liveTime||'')}<br>${esc(e.venue||'')} ${esc(e.city||'')}</strong></div><div class="box"><small>${esc(e.saleLabel)}</small><strong>${esc(e.saleDate?fmt(e.saleDate):(e.summary||'販売日時は公式ページで確認してください'))}${e.saleEndDate?'<br>終了 '+esc(fmt(e.saleEndDate)):''}</strong></div></div><div class="actions"><button class="btn ghost saleCal" data-id="${esc(e.id)}">販売開始をカレンダーへ</button><button class="btn ghost cal" data-id="${esc(e.id)}">公演をカレンダーへ</button><a class="btn dark" href="${esc(e.url||'#')}" target="_blank" rel="noopener">公式・販売ページ</a></div></article>`}).join('');document.querySelectorAll('.cal').forEach(b=>b.onclick=()=>createICS(allEvents().find(e=>e.id===b.dataset.id)));document.querySelectorAll('.saleCal').forEach(b=>b.onclick=()=>createSaleAlert(allEvents().find(e=>e.id===b.dataset.id)))}$('log').innerHTML=state.logs.length?state.logs.map(x=>`<div class="${x.error?'error':''}">${esc(x.text)}</div>`).join(''):'<div>更新結果がここに表示されます。</div>'}
async function update(){const btn=$('update');btn.disabled=true;btn.textContent='確認中…';state.logs=[];const oldSeen={...state.seen},combined=[];for(const artist of activeArtists()){const targets=[['公式サイト','/api/official?artist='+encodeURIComponent(artist.name)],['Ticketmaster','/api/events?artist='+encodeURIComponent(artist.name)+'&country=JP']];for(const [label,url] of targets){try{const r=await fetch(url);const j=await r.json();if(!r.ok)throw new Error(j.error||'取得失敗');let events=j.events||[];if(label==='公式サイト'&&j.supported&&!events.length&&j.officialUrl){events=[{id:'official-link-'+artist.name,artist:j.artist||artist.name,title:'公式ライブ情報を確認',venue:'',city:'',liveDate:'',liveTime:'',saleLabel:'公式サイト',saleDate:'',saleEndDate:'',status:'waiting',url:j.officialUrl,source:(j.artist||artist.name)+'公式サイト',summary:j.warning?'サイトの自動取得が制限されています。公式ページを開いて確認してください。':'現在の掲載内容を公式ページで確認してください。'}]}events=events.map(e=>({...e,isNew:!oldSeen[e.id]}));events.forEach(e=>{state.seen[e.id]=true});combined.push(...events);state.logs.push({text:`${artist.name}（${label}）：${events.length}件を確認${j.warning?'・公式リンクを表示':''}`})}catch(err){state.logs.push({text:`${artist.name}（${label}）：取得できませんでした（${err.message}）`,error:true})}}}state.events=combined.sort((a,b)=>(a.liveDate||'9999').localeCompare(b.liveDate||'9999'));state.lastChecked=new Date().toISOString();save();render();btn.disabled=false;btn.textContent='↻ 公式情報を更新';toast('更新が完了しました')}
$('add').onclick=()=>{const name=$('artistInput').value.trim();if(!name)return toast('アーティスト名を入力してください');if(state.artists.some(a=>a.name.toLowerCase()===name.toLowerCase()))return toast('登録済みです');state.artists.push({id:'a'+Date.now(),name,active:true});$('artistInput').value='';save();render();toast(name+'を登録しました')};$('artistInput').onkeydown=e=>{if(e.key==='Enter')$('add').click()};$('update').onclick=update;$('reset').onclick=()=>{if(confirm('登録内容を初期状態に戻しますか？')){state=structuredClone(defaults);save();render()}};render()})();
</script></body></html>
